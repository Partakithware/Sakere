<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakere</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Base ────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #06080F;
  --surface:   #0B0F1A;
  --surface2:  #111827;
  --surface3:  #1A2235;
  --border:    rgba(255,255,255,0.07);
  --accent:    #3B82F6;
  --accent2:   #60A5FA;
  --accent-dim: rgba(59,130,246,0.15);
  --accent-glow: rgba(59,130,246,0.4);
  --text:      #E2E8F8;
  --text2:     #8B9DC3;
  --text3:     #4A5A7A;
  --red:       #EF4444;
  --green:     #10B981;
  --gold:      #F59E0B;
  --radius:    18px;
  --radius-sm: 12px;
  --radius-lg: 24px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --sidebar-w: 240px;
}
/* Globally kill focus outlines — keyboard shortcuts work via document listener */
button:focus, input[type="range"]:focus { outline: none; box-shadow: none; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Figtree', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}
/* ─── Scrollbar ────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ─── Layout ──────────────────────────────────────────────────────── */
#app { display: flex; min-height: 100vh; }

/* ─── Sidebar ─────────────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  min-height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0;
  z-index: 100;
  padding: 28px 0;
  transition: transform var(--transition);
}
.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 0 24px 32px;
}
.logo-icon {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 0 20px var(--accent-glow);
}
.logo-text {
  font-family: 'Montserrat', sans-serif;
  font-size: 22px; font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--text), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.nav-section { padding: 0 12px; flex: 1; }
.nav-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text3); padding: 8px 12px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 14px; font-weight: 500;
  color: var(--text2);
  transition: all var(--transition);
  user-select: none; position: relative;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active {
  background: var(--accent-dim);
  color: var(--accent2);
}
.nav-item.active::before {
  content: '';
  position: absolute; left: 0; top: 20%; bottom: 20%;
  width: 3px; border-radius: 99px;
  background: var(--accent);
}
.nav-icon { font-size: 18px; width: 22px; text-align: center; flex-shrink: 0; }
.sidebar-footer { padding: 16px 24px 0; border-top: 1px solid var(--border); }

/* ─── Main Content ────────────────────────────────────────────────── */
#main {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
}
#topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(6,8,15,0.8);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex; align-items: center; gap: 16px;
}
.topbar-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 20px; font-weight: 700;
  flex: 1;
}
.search-wrap {
  position: relative; flex: 1; max-width: 380px;
}
.search-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 10px 18px 10px 42px;
  color: var(--text);
  font-size: 14px; font-family: 'Figtree', sans-serif;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.search-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.search-input::placeholder { color: var(--text3); }
.search-icon {
  position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3); font-size: 16px;
  pointer-events: none;
}
#page-content { padding: 32px; flex: 1; }

/* ─── Buttons ─────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px;
  border-radius: 99px;
  border: none; cursor: pointer;
  font-family: 'Figtree', sans-serif;
  font-size: 14px; font-weight: 600;
  transition: all var(--transition);
  user-select: none; white-space: nowrap;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 20px var(--accent-glow);
}
.btn-primary:hover {
  background: var(--accent2);
  transform: translateY(-1px);
  box-shadow: 0 6px 28px var(--accent-glow);
}
.btn-ghost {
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--surface3); color: var(--text); }
.btn-sm { padding: 7px 14px; font-size: 13px; }
.btn-icon {
  width: 38px; height: 38px; padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 50%; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text2);
  cursor: pointer; transition: all var(--transition);
  font-size: 16px;
}
.btn-icon:hover { background: var(--surface3); color: var(--text); }

/* ─── Cards ───────────────────────────────────────────────────────── */
.media-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 20px;
}
.media-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
}
.media-card:hover {
  border-color: rgba(59,130,246,0.3);
  transform: translateY(-4px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(59,130,246,0.2);
}
.card-poster {
  aspect-ratio: 2/3;
  background: var(--surface2);
  position: relative; overflow: hidden;
}
.card-poster img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
}
.media-card:hover .card-poster img { transform: scale(1.05); }
.card-no-poster {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px; color: var(--text3);
  font-size: 36px;
}
.card-no-poster span { font-size: 13px; text-align: center; padding: 0 8px; }
.card-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(6,8,15,0.95) 0%, rgba(6,8,15,0) 50%);
  opacity: 0; transition: opacity var(--transition);
  display: flex; align-items: flex-end; padding: 14px;
}
.media-card:hover .card-overlay { opacity: 1; }
.play-btn-overlay {
  width: 44px; height: 44px;
  background: var(--accent);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 4px 20px var(--accent-glow);
  transform: scale(0.8);
  transition: transform var(--transition);
}
.media-card:hover .play-btn-overlay { transform: scale(1); }
.card-badge {
  position: absolute; top: 10px; right: 10px;
  background: rgba(6,8,15,0.85);
  backdrop-filter: blur(8px);
  border-radius: 99px;
  padding: 3px 8px;
  font-size: 11px; font-weight: 600;
  color: var(--text2);
  border: 1px solid var(--border);
}
.card-badge.watched { color: var(--green); border-color: rgba(16,185,129,0.3); }
.card-info { padding: 12px; }
.card-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 14px; font-weight: 600;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-meta { font-size: 12px; color: var(--text3); margin-top: 4px; }
.card-rating { color: var(--gold); }
.progress-bar-card {
  height: 2px; background: var(--surface3);
  margin: 8px 0 0;
}
.progress-bar-fill {
  height: 100%; background: var(--accent);
  border-radius: 99px;
  transition: width 0.3s ease;
}

/* ─── Hero / Featured ─────────────────────────────────────────────── */
.hero {
  position: relative;
  height: 440px;
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 40px;
  background: var(--surface);
}
.hero-bg {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
}
.hero-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(
    90deg,
    rgba(6,8,15,0.97) 0%,
    rgba(6,8,15,0.7) 40%,
    rgba(6,8,15,0.2) 100%
  );
}
.hero-content {
  position: relative; z-index: 2;
  height: 100%;
  display: flex; flex-direction: column;
  justify-content: flex-end;
  padding: 40px;
  max-width: 540px;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--accent-dim);
  border: 1px solid rgba(59,130,246,0.3);
  border-radius: 99px;
  padding: 4px 12px;
  font-size: 12px; font-weight: 600; color: var(--accent2);
  margin-bottom: 12px; width: fit-content;
}
.hero-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 38px; font-weight: 800;
  line-height: 1.1; letter-spacing: -0.5px;
  margin-bottom: 12px;
}
.hero-overview {
  font-size: 15px; color: var(--text2);
  margin-bottom: 24px;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden;
}
.hero-actions { display: flex; gap: 12px; align-items: center; }
.hero-meta { display: flex; gap: 16px; color: var(--text3); font-size: 13px; align-items: center; }
.hero-rating { color: var(--gold); display: flex; align-items: center; gap: 4px; }
.hero-empty {
  height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; color: var(--text3); text-align: center; padding: 40px;
}

/* ─── Section Headers ─────────────────────────────────────────────── */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.section-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 20px; font-weight: 700;
}
.section-link {
  font-size: 13px; color: var(--accent2); cursor: pointer;
  transition: opacity var(--transition);
}
.section-link:hover { opacity: 0.7; }
.section-gap { margin-bottom: 40px; }

/* ─── Modal ───────────────────────────────────────────────────────── */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: none;
  overflow-y: auto;           /* BACKDROP scrolls, not the modal */
  padding: 40px 32px;
}
.modal-backdrop.open { display: block; }  /* block, not flex — flex was constraining height */
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  width: 100%; max-width: 920px;
  margin: 0 auto;             /* center horizontally */
  overflow: visible;          /* let content flow naturally */
  display: flex; flex-direction: column;
  animation: modalIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.modal-hero { flex-shrink: 0; position: relative; height: 280px; background: var(--surface2); }
.modal-body { padding: 48px 32px 40px; }
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.93) translateY(20px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-close {
  position: absolute; top: 20px; right: 20px;
  width: 38px; height: 38px;
  background: rgba(6,8,15,0.7);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 20px;
  transition: background var(--transition);
  z-index: 2;
}
.modal-close:hover { background: var(--surface2); }
.modal-hero-bg {
  width: 100%; height: 100%;
  object-fit: cover;
}
.modal-hero-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(to top, var(--surface) 0%, transparent 60%);
}
.modal-hero-poster {
  position: absolute; bottom: -30px; left: 32px;
  width: 90px; height: 135px;
  border-radius: 10px; border: 3px solid var(--surface);
  object-fit: cover;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.modal-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 28px; font-weight: 800;
  margin-bottom: 6px; letter-spacing: -0.3px;
}
.modal-tagline { font-size: 14px; color: var(--text3); font-style: italic; margin-bottom: 16px; }
.modal-meta-row {
  display: flex; gap: 16px; flex-wrap: wrap;
  margin-bottom: 20px; font-size: 13px; color: var(--text2);
}
.modal-meta-item { display: flex; align-items: center; gap: 5px; }
.modal-overview { font-size: 15px; color: var(--text2); line-height: 1.7; margin-bottom: 24px; }
.modal-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
.modal-info-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 24px;
}
.info-chip {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
}
.info-chip-label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
.info-chip-value { font-size: 15px; font-weight: 600; margin-top: 4px; }
/* Season/Episode list */
.season-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.season-tab {
  padding: 7px 16px; border-radius: 99px;
  background: var(--surface2); border: 1px solid var(--border);
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all var(--transition); color: var(--text2);
}
.season-tab.active {
  background: var(--accent-dim); border-color: rgba(59,130,246,0.4);
  color: var(--accent2);
}
.episode-list { display: flex; flex-direction: column; gap: 10px; }
.episode-item {
  display: flex; gap: 14px; align-items: flex-start;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px; cursor: pointer;
  transition: all var(--transition);
}
.episode-item:hover { border-color: rgba(59,130,246,0.3); background: var(--surface3); }
.episode-still {
  width: 140px; height: 80px; border-radius: 8px;
  object-fit: cover; flex-shrink: 0; background: var(--surface3);
}
.episode-still-placeholder {
  width: 140px; height: 80px; border-radius: 8px;
  background: var(--surface3); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: var(--text3);
}
.ep-info { flex: 1; }
.ep-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.ep-num { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
.ep-overview {
  font-size: 13px; color: var(--text2);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ─── Player Modal ────────────────────────────────────────────────── */
.player-modal-backdrop {
  position: fixed; inset: 0;
  background: #000;
  z-index: 300;
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
}
.player-modal-backdrop.open { display: flex; }
.player-topbar {
  position: absolute; top: 0; left: 0; right: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
  padding: 20px 24px;
  display: flex; align-items: center; gap: 14px;
  z-index: 2; opacity: 0; transition: opacity var(--transition);
}
.player-modal-backdrop:hover .player-topbar,
.player-modal-backdrop.controls-visible .player-topbar { opacity: 1; }
.player-title { font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 700; flex: 1; }
video#player {
  width: 100%; height: 100%;
  max-height: 100vh;
  background: #000;
}
/* Add this to hide the cursor */
.player-modal-backdrop.idle {
  cursor: none;
}

/* Update your existing controls style to rely on the .idle class */
.player-controls {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
  padding: 40px 24px 24px;
  z-index: 2; 
  opacity: 1; /* Default to visible */
  transition: opacity 0.3s ease;
}

/* Hide controls when in idle state */
.player-modal-backdrop.open.idle .player-controls {
  opacity: 0;
}
.player-modal-backdrop.open.idle .player-topbar {
  opacity: 0;
}

.player-modal-backdrop:hover .player-controls,
.player-modal-backdrop.controls-visible .player-controls { opacity: 1; }
.player-progress {
  width: 100%; height: 5px;
  background: rgba(255,255,255,0.2);
  border-radius: 99px; cursor: pointer;
  margin-bottom: 14px; position: relative;
}
.player-progress-fill {
  height: 100%; background: var(--accent);
  border-radius: 99px; pointer-events: none;
  position: relative;
}
.player-progress-fill::after {
  content: '';
  position: absolute; right: -6px; top: -4px;
  width: 13px; height: 13px;
  background: #fff; border-radius: 50%;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}
.player-btns {
  display: flex; align-items: center; gap: 16px;
}
.player-time { font-size: 13px; color: rgba(255,255,255,0.7); font-variant-numeric: tabular-nums; }
.player-spacer { flex: 1; }
.pbtn {
  background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,0.85);
  font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  transition: color var(--transition), transform var(--transition);
  padding: 4px;
  outline: none; -webkit-tap-highlight-color: transparent;
  user-select: none; tabindex: -1;
}
.pbtn:hover { color: #fff; transform: scale(1.15); }
.pbtn:focus { outline: none; box-shadow: none; }
.pbtn.play-pause { font-size: 28px; }
.track-picker {
  position: absolute; bottom: 80px; right: 16px;
  background: rgba(10,12,20,0.97); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px; padding: 12px; min-width: 240px; max-width: 320px;
  z-index: 10; display: none;
}
.track-picker.open { display: block; }
.track-picker-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 8px; padding: 0 4px;
}
.track-option {
  padding: 8px 10px; border-radius: 8px; cursor: pointer;
  font-size: 13px; color: rgba(255,255,255,0.8);
  transition: background 0.15s; display: flex; align-items: center; gap: 8px;
}
.track-option:hover { background: rgba(255,255,255,0.08); }
.track-option.active { background: rgba(59,130,246,0.25); color: #60a5fa; }
.track-option .track-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.track-section + .track-section { border-top: 1px solid rgba(255,255,255,0.07); margin-top: 8px; padding-top: 8px; }
.volume-wrap { display: flex; align-items: center; gap: 8px; }
.volume-slider {
  -webkit-appearance: none;
  width: 80px; height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 99px; outline: none; cursor: pointer;
}
.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%; background: #fff;
  cursor: pointer;
}

/* ─── Settings Page ───────────────────────────────────────────────── */
.settings-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  margin-bottom: 20px;
}
.settings-card h3 {
  font-family: 'Montserrat', sans-serif;
  font-size: 17px; font-weight: 700;
  margin-bottom: 6px;
}
.settings-card p { font-size: 13px; color: var(--text3); margin-bottom: 20px; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; display: block; }
.form-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  color: var(--text);
  font-size: 14px; font-family: 'Figtree', sans-serif;

// ─── Navigation ──────────────────────────────────────────────────────
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-page="${page}"]`)?.classList.add('active');
  const titles = { home: 'Home', movies: 'Movies', shows: 'TV Shows', settings: 'Settings' };
  document.getElementById('page-title').textContent = titles[page] || page;
  document.getElementById('search-input').value = '';
  renderPage(page);
}

async function renderPage(page) {
  const c = document.getElementById('page-content');
  c.innerHTML = '<div style="padding:40px;color:var(--text3);text-align:center;font-size:32px">⏳</div>';
  if (page === 'home') await renderHome();
  else if (page === 'movies') await renderMovies();
  else if (page === 'shows') await renderShows();
  else if (page === 'settings') await renderSettings();
}

  try {

    return r.json();
  } catch(e) {
    console.error('API error:', e);
    return null;
  }

// Generate fake episode lists for a show
function demoEps(showId, season, count, year) {
  const titles = ['Pilot','The Setup','Breaking Point','Turning Point','Consequences','Revelation','The Choice','No Way Out','Endgame','Full Circle','The Truth','Last Stand','Finale'];
  return Array.from({length:count}, (_,i) => ({
    id: showId * 1000 + season * 100 + i,
    title: titles[i % titles.length],
    season, episode: i+1,
    overview: 'A gripping episode that advances the story in unexpected ways.',
    still_path: null,
    air_date: `${year}-${String((i+1)).padStart(2,'0')}-01`,
    duration: 2700 + Math.floor(Math.random()*1800),
    resolution: '1080p',
    runtime: 45 + Math.floor(Math.random()*20),
    watched: season < 2 && i < 4,
    watch_progress: season === 2 && i === 0 ? 1200 : 0,
    needs_remux: false,
  }));
}

function demoApi(path) {
  // Strip query string for matching
  const base = path.split('?')[0];

  if (base === '/api/settings')          return { tmdb_api_key:'demo', library_paths:[] };
  if (base === '/api/system')            return { ffmpeg: true };
  if (base === '/api/recently-added')    return [...DEMO_MOVIES, ...DEMO_SHOWS].sort(() => Math.random()-0.5).slice(0,12);
  if (base === '/api/continue-watching') return DEMO_CW;
  if (base === '/api/library/paths')     return [];
  if (base === '/api/scan/progress')     return { running:false, current:0, total:0, current_file:'' };

  if (base === '/api/movies') return DEMO_MOVIES;
  if (base === '/api/shows')  return DEMO_SHOWS;

  // Single movie/show lookups
  const movieMatch = base.match(/^\/api\/movies\/(\d+)$/);
  if (movieMatch) return DEMO_MOVIES.find(m => m.id === +movieMatch[1]) || null;
  const showMatch = base.match(/^\/api\/shows\/(\d+)$/);
  if (showMatch)  return DEMO_SHOWS.find(s => s.id === +showMatch[1]) || null;

  // Ignore writes silently
  return {};
}


// ─── Format helpers ──────────────────────────────────────────────────
function fmtTime(secs) {
  if (secs == null || isNaN(secs) || !isFinite(secs)) return '--:--';
  secs = Math.max(0, Math.floor(secs));
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}
function fmtRuntime(mins) {
  if (!mins) return '';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}
function fmtSize(bytes) {
  if (!bytes) return '';
  const gb = bytes / 1073741824;
  return gb >= 1 ? `${gb.toFixed(1)} GB` : `${(bytes/1048576).toFixed(0)} MB`;
}
function starRating(r) {
  if (!r) return '';
  return `⭐ ${r.toFixed(1)}`;
}
function progressPct(item) {
  if (!item.duration || !item.watch_progress) return 0;
  return Math.min(100, (item.watch_progress / item.duration) * 100);
}

// ─── Card builder ────────────────────────────────────────────────────
function buildCard(item) {
  const pct = progressPct(item);
  const posterHtml = item.poster_path
    ? `<img src="${item.poster_path}" alt="${item.title}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-no-poster><span>🎬</span><span>${escHtml(item.title)}</span></div>'">`
    : `<div class="card-no-poster"><span>${item.type==='show'?'📺':'🎬'}</span><span>${escHtml(item.title)}</span></div>`;

  const badgeHtml = item.watched ? '<div class="card-badge watched">✓ Watched</div>' : (item.resolution ? `<div class="card-badge">${item.resolution}</div>` : '');
  const progressHtml = pct > 0 ? `<div class="progress-bar-card"><div class="progress-bar-fill" style="width:${pct}%"></div></div>` : '';
  const metaStr = [item.year || (item.first_air_date ? item.first_air_date.slice(0,4) : ''), starRating(item.rating), item.episode_count ? `${item.episode_count} eps` : ''].filter(Boolean).join(' · ');

  return `
    <div class="media-card card-anim fade-in" onclick="openMedia('${item.type}', ${item.id})">
      <div class="card-poster">
        ${posterHtml}
        <div class="card-overlay"><!--<div class="play-btn-overlay">▶</div>--></div>
        ${badgeHtml}
      </div>
      <div class="card-info">
        <div class="card-title">${escHtml(item.title)}</div>
        <div class="card-meta">${metaStr}</div>
        ${progressHtml}
      </div>
    </div>`;
}
function escHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
// Safe for embedding in single-quoted JS strings inside onclick="..." attributes
function jsStr(str) {
  return (str||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\r?\n/g,' ');
}

// Registry: store episode/movie data keyed by "type-id" so onclicks only need IDs
const _reg = {};
function reg(key, data) { _reg[key] = data; return data; }
function getReg(key) { return _reg[key]; }

// ─── Search ──────────────────────────────────────────────────────────
function handleSearch(val) {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    if (currentPage === 'movies') renderMovies(val);
    else if (currentPage === 'shows') renderShows(val);
    else if (currentPage === 'home' && val) navigate('movies');
  }, 300);
}

// ─── Transcoding settings helpers ────────────────────────────────────────────
let _tcState = { preset: 'fast', crf: 22, audioBitrate: '192k' };

function selectPreset(p) {
  _tcState.preset = p;
  document.querySelectorAll('#preset-btns .btn').forEach(b => b.classList.remove('btn-primary'));
  const btn = document.getElementById('preset-btn-' + p);
  if (btn) btn.classList.add('btn-primary');
}

function selectAudioBitrate(b) {
  _tcState.audioBitrate = b;
  document.querySelectorAll('#audio-btns .btn').forEach(el => el.classList.remove('btn-primary'));
  const btn = document.getElementById('audio-btn-' + b);
  if (btn) btn.classList.add('btn-primary');
}

async function saveTranscodeSettings() {
  const crf = parseInt(document.getElementById('crf-slider').value);
  const body = {
    transcode_preset: _tcState.preset,
    transcode_crf: crf,
    transcode_audio_bitrate: _tcState.audioBitrate,
  };
  const r = await api('/api/settings', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  if (r?.ok) showToastMsg('✓ Transcoding settings saved!');
  else showToastMsg('✗ Failed to save settings', true);
}

// Keep _tcState in sync when the settings page is re-rendered
const _origRenderSettings = window.renderSettings;

async function saveApiKey() {
  const key = document.getElementById('tmdb-key').value.trim();
  const r = await api('/api/settings', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({tmdb_api_key: key})
  });
  if (r?.ok) showToastMsg('✓ API key saved!');
}

async function addPath() {
  const path = document.getElementById('new-path').value.trim();
  const type = document.getElementById('path-type').value;
  if (!path) return;
  const r = await api('/api/library/paths', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({path, media_type: type})
  });
  if (r?.ok) { renderSettings(); showToastMsg('✓ Path added!'); }
  else showToastMsg('✗ Could not add path — does it exist?', true);
}

async function removePath(id) {
  const r = await api(`/api/library/paths/${id}`, {method:'DELETE'});
  if (r?.ok) renderSettings();
}

// ─── Media Detail Modal ───────────────────────────────────────────────
async function openMedia(type, id, startAt = 0, remux = false, duration = 0, showId = null) {
  // Episodes from Continue Watching: play directly instead of opening a modal
  if (type === 'episode') {
    playMedia('episode', id, '', remux, duration, startAt, 0, 0, -1, false, showId);
    // If we don't have season data yet for this show, fetch it in background
    if (showId && window._currentShowId !== showId) {
      api(`/api/shows/${showId}`).then(data => {
        if (data?.seasons) {
          window._currentShowId = showId;
          window._currentShowSeasons = data.seasons;
          _buildEpisodeList(showId, data.seasons, id);
        }
      });
    }
    return;
  }
  currentMediaId = id;
  currentMediaType = type;
  const data = await api(type === 'movie' ? `/api/movies/${id}` : `/api/shows/${id}`);
  if (!data) return;

  let html = '';
  if (type === 'movie') {
    html = buildMovieModal(data);
  } else {
    html = buildShowModal(data);
  }

  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('media-modal').classList.add('open');
  document.body.style.overflow = 'hidden';

  if (type === 'show' && data.seasons) {
    const firstSeason = Object.keys(data.seasons).sort((a,b)=>Number(a)-Number(b))[0];
    if (firstSeason) showSeason(firstSeason);
  }
}

function buildMovieModal(m) {
  const chips = [
    m.year ? `<div class="info-chip"><div class="info-chip-label">Year</div><div class="info-chip-value">${m.year}</div></div>` : '',
    m.runtime ? `<div class="info-chip"><div class="info-chip-label">Runtime</div><div class="info-chip-value">${fmtRuntime(m.runtime)}</div></div>` : '',
    m.rating ? `<div class="info-chip"><div class="info-chip-label">Rating</div><div class="info-chip-value">⭐ ${m.rating.toFixed(1)}</div></div>` : '',
    m.resolution ? `<div class="info-chip"><div class="info-chip-label">Quality</div><div class="info-chip-value">${m.resolution}</div></div>` : '',
    m.video_codec ? `<div class="info-chip"><div class="info-chip-label">Video</div><div class="info-chip-value">${m.video_codec}</div></div>` : '',
    m.audio_codec ? `<div class="info-chip"><div class="info-chip-label">Audio</div><div class="info-chip-value">${m.audio_codec}</div></div>` : '',
    m.file_size ? `<div class="info-chip"><div class="info-chip-label">Size</div><div class="info-chip-value">${fmtSize(m.file_size)}</div></div>` : '',
  ].filter(Boolean).join('');

  return `
    <div class="modal-hero">
      ${m.backdrop_path ? `<img class="modal-hero-bg" src="${m.backdrop_path}" alt="">` : `<div style="width:100%;height:100%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:60px">🎬</div>`}
      <div class="modal-hero-gradient"></div>
      ${m.poster_path ? `<img class="modal-hero-poster" src="${m.poster_path}" alt="">` : ''}
    </div>
    <div class="modal-body">
      <div class="modal-title">${escHtml(m.title)}</div>
      ${m.tagline ? `<div class="modal-tagline">${escHtml(m.tagline)}</div>` : ''}
      ${m.genres ? `<div style="margin-bottom:16px;display:flex;gap:6px;flex-wrap:wrap">${m.genres.split(',').map(g=>`<span class="chip blue">${g.trim()}</span>`).join('')}</div>` : ''}
      ${m.overview ? `<div class="modal-overview">${escHtml(m.overview)}</div>` : ''}
      <div class="modal-actions">
        ${m.watch_progress > 60 && !m.watched
          ? `<button class="btn btn-primary" onclick="playMedia('movie', ${m.id}, '${jsStr(m.title)}', ${!!m.needs_remux}, ${m.duration||0}, ${m.watch_progress||0})">▶ Resume</button>
             <button class="btn btn-ghost" onclick="playMedia('movie', ${m.id}, '${jsStr(m.title)}', ${!!m.needs_remux}, ${m.duration||0}, 0)">↺ Start Over</button>`
          : `<button class="btn btn-primary" onclick="playMedia('movie', ${m.id}, '${jsStr(m.title)}', ${!!m.needs_remux}, ${m.duration||0}, 0)">▶ Play</button>`
        }
        <button class="btn btn-ghost" onclick="markWatched('movie', ${m.id})">${m.watched ? '✓ Watched' : '○ Mark Watched'}</button>
        <button class="btn btn-ghost" onclick="openEditPanel('movie', ${m.id}, '${jsStr(m.title)}')">✎ Fix Match</button>
      </div>
      <div class="modal-info-grid">${chips}</div>
    </div>`;
}

function buildShowModal(s) {
  const seasonKeys = Object.keys(s.seasons||{}).sort((a,b)=>Number(a)-Number(b));
  // Store seasons globally — avoids putting JSON blob in onclick attributes
  window._currentShowSeasons = s.seasons || {};
  window._currentShowId = s.id;
  const tabsHtml = seasonKeys.map(k =>
    `<div class="season-tab" id="stab-${k}" onclick="showSeason('${k}')">${k==='0'?'Specials':`Season ${k}`}</div>`
  ).join('');

  return `
    <div class="modal-hero">
      ${s.backdrop_path ? `<img class="modal-hero-bg" src="${s.backdrop_path}" alt="">` : `<div style="width:100%;height:100%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:60px">📺</div>`}
      <div class="modal-hero-gradient"></div>
      ${s.poster_path ? `<img class="modal-hero-poster" src="${s.poster_path}" alt="">` : ''}
    </div>
    <div class="modal-body">
      <div class="modal-title">${escHtml(s.title)}</div>
      ${s.status ? `<div style="margin-bottom:10px"><span class="chip ${s.status==='Ended'?'':'blue'}">${s.status}</span></div>` : ''}
      ${s.genres ? `<div style="margin-bottom:12px;display:flex;gap:6px;flex-wrap:wrap">${s.genres.split(',').map(g=>`<span class="chip blue">${g.trim()}</span>`).join('')}</div>` : ''}
      ${s.overview ? `<div class="modal-overview">${escHtml(s.overview)}</div>` : ''}
      <div style="margin-bottom:20px">
        <button class="btn btn-ghost btn-sm" onclick="openEditPanel('show', ${s.id}, '${jsStr(s.title)}')">✎ Fix Match</button>
      </div>
      <div class="modal-info-grid">
        ${s.rating ? `<div class="info-chip"><div class="info-chip-label">Rating</div><div class="info-chip-value">⭐ ${s.rating.toFixed(1)}</div></div>` : ''}
        ${s.first_air_date ? `<div class="info-chip"><div class="info-chip-label">First Aired</div><div class="info-chip-value">${s.first_air_date}</div></div>` : ''}
        <div class="info-chip"><div class="info-chip-label">Episodes</div><div class="info-chip-value">${s.episode_count}</div></div>
        <div class="info-chip"><div class="info-chip-label">Watched</div><div class="info-chip-value">${s.watched_count} / ${s.episode_count}</div></div>
      </div>
      ${seasonKeys.length > 0 ? `
        <div class="section-title" style="margin-bottom:16px">Episodes</div>
        <div class="season-tabs" id="season-tabs">${tabsHtml}</div>
        <div id="episode-list" class="episode-list"></div>` : '<p style="color:var(--text3)">No episodes found yet.</p>'}
    </div>`;
}

function showSeason(key) {
  // Read from global storage — no JSON in onclick
  const seasons = window._currentShowSeasons || {};
  document.querySelectorAll('.season-tab').forEach(t => t.classList.remove('active'));
  const tab = document.getElementById(`stab-${key}`);
  if (tab) tab.classList.add('active');
  const eps = seasons[key] || [];
  const listEl = document.getElementById('episode-list');
  if (!listEl) return;
  listEl.innerHTML = eps.map(ep => {
    // Use jsStr to safely embed episode titles with apostrophes
    const safeLabel = jsStr(`S${String(ep.season).padStart(2,'0')}E${String(ep.episode).padStart(2,'0')} \u2014 ${ep.title||''}`);
    return `
    <div class="episode-item" onclick="playMedia('episode', ${ep.id}, '${safeLabel}', ${!!ep.needs_remux}, ${ep.duration||0}, ${ep.watch_progress > 60 && !ep.watched ? ep.watch_progress : 0}, 0, 0, -1, false, ${window._currentShowId||0})">
      ${ep.still_path ? `<img class="episode-still" src="${ep.still_path}" alt="" onerror="this.outerHTML='<div class=episode-still-placeholder>▶</div>'">` : `<div class="episode-still-placeholder">▶</div>`}
      <div class="ep-info">
        <div class="ep-num">S${String(ep.season).padStart(2,'0')}E${String(ep.episode).padStart(2,'0')}${ep.air_date?' · '+ep.air_date:''}</div>
        <div class="ep-title">${escHtml(ep.title || `Episode ${ep.episode}`)}</div>
        ${ep.overview ? `<div class="ep-overview">${escHtml(ep.overview)}</div>` : ''}
        ${ep.watch_progress > 0 && !ep.watched ? `<div class="progress-bar-card" style="margin-top:8px"><div class="progress-bar-fill" style="width:${Math.min(100,(ep.watch_progress/(ep.duration||1))*100)}%"></div></div>` : ''}
        ${ep.watched ? '<div style="font-size:12px;color:var(--green);margin-top:6px">✓ Watched</div>' : ''}
      </div>
      ${ep.resolution ? `<span class="chip" style="flex-shrink:0">${ep.resolution}</span>` : ''}
    </div>`;
  }).join('');
}

async function markWatched(type, id) {
  await api(`/api/${type==='movie'?'movies':'episodes'}/${id}/progress`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},

  });

function closeMediaModal() {
  document.getElementById('media-modal').classList.remove('open');
  document.body.style.overflow = '';
}
function closeModal(e) {

}

// ─── Player ──────────────────────────────────────────────────────────
let playerCurrentId   = null;
let playerCurrentType = null;
let playerIsRemux     = false;
let playerDuration    = 0;   // stored duration from DB (seconds)
let playerSeekOffset  = 0;   // seconds already skipped via remux ?seek=
// Track selection state
let playerTracks      = { video: [], audio: [], subtitles: [] };
let playerAudioIdx    = 0;
let playerVideoIdx    = 0;
let playerSubIdx      = -1;   // -1 = off
let playerSubIsImage  = false;
let playerSubBlobUrl  = null; // active WebVTT blob URL
// Episode autoplay state
let playerShowId      = null; // DB id of the show currently playing
let playerEpisodeList = [];   // flat sorted array of all episodes in the show
let playerEpisodeIdx  = -1;   // index of the current episode in playerEpisodeList
let _upNextTimer      = null; // countdown interval handle

function playMedia(type, id, title, remux = false, duration = 0, seekTo = 0,
                   audioIdx = 0, videoIdx = 0, subIdx = -1, subIsImage = false,
                   showId = null) {
  if (window.DEMO_MODE) {
    showDemoToast();
    return;
  }
  closeMediaModal();
  playerCurrentId   = id;
  playerCurrentType = type;
  playerIsRemux     = remux;
  playerDuration    = duration;
  playerSeekOffset  = seekTo;
  playerAudioIdx    = audioIdx;
  playerVideoIdx    = videoIdx;
  playerSubIdx      = subIdx;
  playerSubIsImage  = subIsImage;

  // Episode autoplay playlist
  // NOTE: save prevShowId BEFORE updating playerShowId — we need to compare them
  const _prevShowId = playerShowId;
  playerShowId = showId || null;

  if (type === 'episode') {
    if (playerShowId && (playerShowId !== _prevShowId || playerEpisodeList.length === 0)) {
      // Different show or cold start — rebuild the full playlist
      if (window._currentShowId === playerShowId && window._currentShowSeasons) {
        // Season data is already cached from the show modal
        _buildEpisodeList(playerShowId, window._currentShowSeasons, id);
      } else {
        // Fetch in background — playback starts immediately without waiting
        api(`/api/shows/${playerShowId}`).then(data => {
          if (data?.seasons) {
            window._currentShowId      = playerShowId;
            window._currentShowSeasons = data.seasons;
            _buildEpisodeList(playerShowId, data.seasons, id);
          }
        });
      }
    } else if (playerShowId && playerEpisodeList.length > 0) {
      // Same show — just slide the index to the new episode
      const idx = playerEpisodeList.findIndex(e => e.id === id);
      if (idx >= 0) playerEpisodeIdx = idx;
    } else if (!playerShowId) {
      // No showId available — try to fetch by episode lookup
      api(`/api/episodes/${id}`).then(epData => {
        const sid = epData?.show_id;
        if (!sid) return;
        playerShowId = sid;
        api(`/api/shows/${sid}`).then(data => {
          if (data?.seasons) {
            window._currentShowId      = sid;
            window._currentShowSeasons = data.seasons;
            _buildEpisodeList(sid, data.seasons, id);
          }
        });
      }).catch(() => {});
    }
  } else {
    // Not an episode — clear playlist
    playerEpisodeList = [];
    playerEpisodeIdx  = -1;
  }

  // Hide track buttons until tracks are loaded
  document.getElementById('track-audio-btn').style.display = 'none';
  document.getElementById('track-sub-btn').style.display   = 'none';
  closeTrackPicker();
  clearSubtitleTrack();
  // Reset the transcode-retry flag so each new play gets a fresh attempt
  delete document.getElementById('player-modal').dataset.transcodeRetried;

  document.getElementById('player-title').textContent   = title || '';
  document.getElementById('player-current').textContent = fmtTime(seekTo);
  document.getElementById('player-total').textContent   = duration > 0 ? fmtTime(duration) : '--:--';
  document.getElementById('player-fill').style.width    = (seekTo > 0 && duration > 0) ? `${Math.min(100,(seekTo/duration)*100)}%` : '0%';
  document.getElementById('play-pause-btn').textContent = '⏸';  // assume it'll play

  const video = document.getElementById('player');
  const base  = type === 'movie' ? `/api/stream/movie/${id}` : `/api/stream/episode/${id}`;

  let url;
  if (remux) {
    const params = new URLSearchParams();
    if (seekTo > 0)    params.set('seek', seekTo);
    if (audioIdx > 0)  params.set('audio_idx', audioIdx);
    if (videoIdx > 0)  params.set('video_idx', videoIdx);
    if (subIdx >= 0 && subIsImage) { params.set('sub_idx', subIdx); params.set('sub_is_image', 'true'); }
    url = `${base}/remux` + (params.toString() ? '?' + params.toString() : '');
  } else {
    url = base;
  }

  // Abort any in-flight fetch on the existing element before we reassign src.
  // Without this, changing src while the browser is mid-request raises a
  // DOMException ("fetching process aborted") that rejects the new play() promise.
  video.pause();
  video.removeAttribute('src');
  video.load();   // flushes the media pipeline synchronously

  // Wire up events BEFORE setting src so no events are missed
  setupPlayerEvents(video);

  video.src = url;
  if (!remux && seekTo > 0) video.currentTime = seekTo;

  document.getElementById('player-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
  video.play().catch(err => {
    // AbortError is expected when the user seeks again before playback starts
    if (err.name !== 'AbortError') {
      document.getElementById('play-pause-btn').textContent = '▶';
    }
  });

  // Load track info in background (don't block playback)
  loadTracks(type, id);
}

function setupPlayerEvents(video) {
  video.ontimeupdate     = null;
  video.onloadedmetadata = null;
  video.onpause          = null;
  video.onplay           = null;
  video.onended          = null;
  video.onerror          = null;
  video.onstalled        = null;
  if (video._stallTimer) { clearTimeout(video._stallTimer); video._stallTimer = null; }

  video.onplay  = () => { document.getElementById('play-pause-btn').textContent = '⏸'; };
  video.onpause = () => { document.getElementById('play-pause-btn').textContent = '▶'; };

  video.onloadedmetadata = () => {
    const total = playerIsRemux
      ? playerDuration
      : (isFinite(video.duration) ? video.duration : playerDuration);
    if (total > 0) {
      document.getElementById('player-total').textContent = fmtTime(total);
      if (!playerIsRemux) playerDuration = total;
    }
  };

  let _upNextShown = false;   // guard: show overlay at most once per episode
  video.ontimeupdate = () => {
    // Clear stall timer once we get real frames
    if (video._stallTimer) { clearTimeout(video._stallTimer); video._stallTimer = null; }
    const totalSecs   = playerDuration;
    const currentSecs = video.currentTime + playerSeekOffset;
    const pct = totalSecs > 0 ? Math.min(100, (currentSecs / totalSecs) * 100) : 0;
    document.getElementById('player-fill').style.width    = pct + '%';
    document.getElementById('player-current').textContent = fmtTime(currentSecs);
    if (totalSecs > 0)
      document.getElementById('player-total').textContent = fmtTime(totalSecs);
    if (Math.round(video.currentTime) % 10 === 0 && video.currentTime > 1)
      saveProgress(currentSecs);

    // Trigger Up Next when within the last 30 s (or last 5% for short episodes).
    // This is more reliable than onended for remux streams where the browser
    // never fires 'ended' on a pipe with no Content-Length.
    if (!_upNextShown && totalSecs > 0 && playerCurrentType === 'episode' &&
        playerEpisodeIdx >= 0 && playerEpisodeIdx < playerEpisodeList.length - 1) {
      const remaining = totalSecs - currentSecs;
      const threshold = Math.max(30, totalSecs * 0.05);
      if (remaining <= threshold && remaining > 0) {
        _upNextShown = true;
        showUpNext();
      }
    }
  };

  // Windows Edge fires 'ended' immediately when it rejects a streaming response
  // (fragmented MP4 pipe with no Content-Length). Detect t=0 end and retry.
  video.onended = () => {
    const currentPos = playerSeekOffset + video.currentTime;
    if (video.currentTime < 2 && playerSeekOffset === 0 && playerIsRemux) {
      console.warn('Stream ended at t≈0 — retrying with forced H.264 transcode');
      retryWithTranscode();
      return;
    }
    saveProgress(currentPos, true);
    // Fallback: show Up Next if ontimeupdate threshold wasn't reached
    // (e.g. user scrubbed to the very end, or onended fired for a direct stream)
    if (!_upNextShown && playerCurrentType === 'episode' &&
        playerEpisodeIdx >= 0 &&
        playerEpisodeIdx < playerEpisodeList.length - 1) {
      _upNextShown = true;
      showUpNext();
    }
  };

  // Also catch stall-at-zero (Edge sometimes stalls instead of ending)
  video.onstalled = () => {
    if (playerIsRemux && video.currentTime === 0 && playerSeekOffset === 0 && !video._stallTimer) {
      video._stallTimer = setTimeout(() => {
        video._stallTimer = null;
        if (video.currentTime === 0) {
          console.warn('Stream stalled at 0 for 8s — retrying with forced H.264 transcode');
          retryWithTranscode();
        }
      }, 8000);
    }
  };

  video.onerror = () => {
    if (!playerIsRemux) {
      // Direct stream failed — first try a plain remux
      console.warn('Direct stream failed — falling back to remux');
      playerIsRemux = true;
      const base = playerCurrentType === 'movie'
        ? `/api/stream/movie/${playerCurrentId}`
        : `/api/stream/episode/${playerCurrentId}`;
      setupPlayerEvents(video);
      video.src = `${base}/remux`;
      video.play().catch(() => {});
    } else {
      // Remux also failed — force H.264 transcode as last resort
      retryWithTranscode();
    }
  };
}

function retryWithTranscode() {
  const modal = document.getElementById('player-modal');
  if (modal.dataset.transcodeRetried) return; // only attempt once per play
  modal.dataset.transcodeRetried = '1';

  const video = document.getElementById('player');
  const base = playerCurrentType === 'movie'
    ? `/api/stream/movie/${playerCurrentId}`
    : `/api/stream/episode/${playerCurrentId}`;

  playerIsRemux = true;
  setupPlayerEvents(video);

  const params = new URLSearchParams();
  if (playerSeekOffset > 0) params.set('seek', playerSeekOffset);
  if (playerAudioIdx > 0)   params.set('audio_idx', playerAudioIdx);
  if (playerVideoIdx > 0)   params.set('video_idx', playerVideoIdx);
  params.set('transcode', '1'); // signals backend to force libx264 re-encode

  video.src = `${base}/remux?${params.toString()}`;
  video.play().catch(() => {});
}

// ─── Track Selection ─────────────────────────────────────────────────
async function loadTracks(type, id) {
  const endpoint = type === 'movie' ? `/api/tracks/movie/${id}` : `/api/tracks/episode/${id}`;
  const tracks = await api(endpoint);
  if (!tracks) return;
  playerTracks = tracks;

  // Show buttons only if there's something to choose from
  const audioBtn = document.getElementById('track-audio-btn');
  const subBtn   = document.getElementById('track-sub-btn');
  audioBtn.style.display = tracks.audio.length > 1    ? 'flex' : 'none';
  subBtn.style.display   = tracks.subtitles.length > 0 ? 'flex' : 'none';

  // If sub was pre-selected (track switch), re-apply it
  if (playerSubIdx >= 0 && !playerSubIsImage) {
    applyTextSubtitle(playerSubIdx);
  }
}

function toggleTrackPicker(section) {
  const picker = document.getElementById('track-picker');
  // If already open on same section, close it
  if (picker.classList.contains('open') && picker.dataset.section === section) {
    closeTrackPicker(); return;
  }
  picker.dataset.section = section;

  if (section === 'audio') {
    let html = `<div class="track-picker-title">Audio Track</div><div class="track-section">`;
    playerTracks.audio.forEach(t => {
      html += `<div class="track-option ${t.idx === playerAudioIdx ? 'active' : ''}" onclick="selectAudioTrack(${t.idx})">
        <span class="track-dot"></span>${escHtml(t.title)}
      </div>`;
    });
    html += `</div>`;
    picker.innerHTML = html;
  } else {
    let html = `<div class="track-picker-title">Subtitles</div><div class="track-section">`;
    html += `<div class="track-option ${playerSubIdx === -1 ? 'active' : ''}" onclick="selectSubtitle(-1, false)">
      <span class="track-dot"></span>Off
    </div>`;
    playerTracks.subtitles.forEach(t => {
      const imgNote = t.is_image ? ' <span style="opacity:.5;font-size:11px">(burned in)</span>' : '';
      html += `<div class="track-option ${t.idx === playerSubIdx ? 'active' : ''}" onclick="selectSubtitle(${t.idx}, ${t.is_image})">
        <span class="track-dot"></span>${escHtml(t.title)}${imgNote}
      </div>`;
    });
    html += `</div>`;
    picker.innerHTML = html;
  }

  picker.classList.add('open');
  // Close when clicking outside
  setTimeout(() => {
    document.addEventListener('click', closeTrackPickerOutside, { once: true });
  }, 10);
}

function closeTrackPickerOutside(e) {
  const picker = document.getElementById('track-picker');
  if (!picker.contains(e.target)) closeTrackPicker();
  else document.addEventListener('click', closeTrackPickerOutside, { once: true });
}
function closeTrackPicker() {
  document.getElementById('track-picker').classList.remove('open');
}

function selectAudioTrack(idx) {
  closeTrackPicker();
  if (idx === playerAudioIdx) return;
  // Restart stream with new audio track, preserving position
  const currentPos = playerSeekOffset + document.getElementById('player').currentTime;
  playMedia(playerCurrentType, playerCurrentId,
            document.getElementById('player-title').textContent,
            true, playerDuration, currentPos,
            idx, playerVideoIdx, playerSubIdx, playerSubIsImage);
}

function selectSubtitle(idx, isImage) {
  closeTrackPicker();
  playerSubIdx     = idx;
  playerSubIsImage = isImage;
  clearSubtitleTrack();

  if (idx === -1) return; // off

  if (isImage) {
    // Image subs (PGS/VOBSUB) must be burned in — restart remux
    const currentPos = playerSeekOffset + document.getElementById('player').currentTime;
    playMedia(playerCurrentType, playerCurrentId,
              document.getElementById('player-title').textContent,
              true, playerDuration, currentPos,
              playerAudioIdx, playerVideoIdx, idx, true);
  } else {
    // Text subs (SRT/ASS): serve as WebVTT, inject <track> — no re-encode
    applyTextSubtitle(idx);
  }
}

async function applyTextSubtitle(idx) {
  const type = playerCurrentType;
  const id   = playerCurrentId;
  const endpoint = type === 'movie'
    ? `/api/subtitles/movie/${id}?track=${idx}`
    : `/api/subtitles/episode/${id}?track=${idx}`;

  try {
    const resp = await fetch(endpoint);
    if (!resp.ok) throw new Error('Sub fetch failed');
    const vttText = await resp.text();
    const blob = new Blob([vttText], { type: 'text/vtt' });
    if (playerSubBlobUrl) URL.revokeObjectURL(playerSubBlobUrl);
    playerSubBlobUrl = URL.createObjectURL(blob);

    const video = document.getElementById('player');
    // Remove existing tracks
    [...video.querySelectorAll('track')].forEach(t => t.remove());
    const track = document.createElement('track');
    track.kind    = 'subtitles';
    track.src     = playerSubBlobUrl;
    track.default = true;
    video.appendChild(track);
    // Force enable
    if (video.textTracks[0]) video.textTracks[0].mode = 'showing';
  } catch (e) {
    console.warn('Failed to load subtitle track:', e);
  }
}

function clearSubtitleTrack() {
  const video = document.getElementById('player');
  [...video.querySelectorAll('track')].forEach(t => t.remove());
  if (playerSubBlobUrl) { URL.revokeObjectURL(playerSubBlobUrl); playerSubBlobUrl = null; }
  if (video.textTracks[0]) video.textTracks[0].mode = 'disabled';
}

function playerSeek(e) {
  const bar  = document.getElementById('player-progress');
  const rect = bar.getBoundingClientRect();
  const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  const total = playerDuration || 0;
  if (!total) return;

  const targetSecs = pct * total;

  if (playerIsRemux) {
    // Can't byte-seek a pipe — restart FFmpeg from the new position
    playMedia(playerCurrentType, playerCurrentId,
      document.getElementById('player-title').textContent,
      true, playerDuration, targetSecs);
  } else {
    const video = document.getElementById('player');
    if (isFinite(video.duration)) {
      video.currentTime = targetSecs;
    }
  }
}

function saveProgress(secs, done = false) {
  if (!playerCurrentId) return;
  const endpoint = playerCurrentType === 'movie' ? 'movies' : 'episodes';
  api(`/api/${endpoint}/${playerCurrentId}/progress`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({progress: secs, watched: done})
  });
}

function closePlayer() {
  const video = document.getElementById('player');
  saveProgress(playerSeekOffset + video.currentTime);

  // Cancel any Up Next countdown
  upNextCancel();

  // Kill the stall-detection timer before it can trigger retryWithTranscode
  if (video._stallTimer) { clearTimeout(video._stallTimer); video._stallTimer = null; }

  // Null all event handlers so nothing can restart playback after we leave
  video.ontimeupdate     = null;
  video.onloadedmetadata = null;
  video.onplay           = null;
  video.onpause          = null;
  video.onended          = null;
  video.onerror          = null;
  video.onstalled        = null;

  video.pause();
  video.src = '';
  video.load(); // fully reset the media element so no pending requests linger

  clearSubtitleTrack();
  closeTrackPicker();
  document.getElementById('player-modal').classList.remove('open');
  document.getElementById('player-modal').dataset.transcodeRetried = '1'; // prevent any queued retry
  document.body.style.overflow = '';
}

function togglePlay() {
  const v = document.getElementById('player');
  v.paused ? v.play() : v.pause();
}
function skipBack() {
  const video = document.getElementById('player');
  const current = playerSeekOffset + video.currentTime;
  const newPos = Math.max(0, current - 10);
  if (playerIsRemux) {
    playMedia(playerCurrentType, playerCurrentId,
      document.getElementById('player-title').textContent,
      true, playerDuration, newPos);
  } else {
    video.currentTime = Math.max(0, video.currentTime - 10);
  }
}
function skipForward() {
  const video = document.getElementById('player');
  const current = playerSeekOffset + video.currentTime;
  const newPos = current + 10;
  if (playerIsRemux) {
    playMedia(playerCurrentType, playerCurrentId,
      document.getElementById('player-title').textContent,
      true, playerDuration, newPos);
  } else {
    video.currentTime = video.currentTime + 10;
  }
}
function toggleMute() {
  const v = document.getElementById('player');
  v.muted = !v.muted;
  document.getElementById('mute-btn').textContent = v.muted ? '🔇' : '🔊';
}
function setVolume(val) { document.getElementById('player').volume = val; }
function toggleFullscreen() {
  const el = document.getElementById('player-modal');
  if (document.fullscreenElement) document.exitFullscreen();
  else el.requestFullscreen();
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  const playerOpen = document.getElementById('player-modal').classList.contains('open');
  if (playerOpen) {
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowLeft')  skipBack();
    if (e.code === 'ArrowRight') skipForward();
    if (e.code === 'Escape') closePlayer();
  } else if (document.getElementById('media-modal').classList.contains('open')) {
    if (e.code === 'Escape') closeMediaModal();
  }
});

// ─── Scan ────────────────────────────────────────────────────────────
async function triggerScan() {
  if (window.DEMO_MODE) { showDemoToast(); return; }
  const r = await api('/api/library/scan', {method:'POST'});
  if (!r) return;
  if (!r.ok) { showToastMsg(r.message || 'Scan failed', true); return; }
  showToastMsg('⟳ Scan started!');
  startScanPolling();
}

function startScanPolling() {
  const toast = document.getElementById('scan-toast');
  toast.classList.add('visible');
  if (scanInterval) clearInterval(scanInterval);
  scanInterval = setInterval(async () => {
    const s = await api('/api/library/scan/progress');
    if (!s) return;
    document.getElementById('scan-pct').textContent = s.percent + '%';
    document.getElementById('scan-bar').style.width = s.percent + '%';
    const file = s.current_file ? s.current_file.split('/').pop() : 'Starting...';
    document.getElementById('scan-file').textContent = file;
    if (!s.running) {
      clearInterval(scanInterval);
      scanInterval = null;
      setTimeout(() => { toast.classList.remove('visible'); renderPage(currentPage); }, 1500);
    }
  }, 800);
}

// ─── Toast ───────────────────────────────────────────────────────────
// ─── Episode autoplay / Up Next ──────────────────────────────────────────────

/**
 * Build a flat, season+episode ordered list from the show's seasons dict.
 * Skips season 0 (specials) — they shouldn't interrupt linear playback.
 */
function _buildEpisodeList(showId, seasons, currentEpId) {
  const list = [];
  const keys = Object.keys(seasons)
    .map(Number)
    .filter(k => k > 0)   // skip specials
    .sort((a, b) => a - b);

  for (const season of keys) {
    const eps = (seasons[String(season)] || [])
      .slice()
      .sort((a, b) => a.episode - b.episode);
    for (const ep of eps) {
      list.push({
        id:          ep.id,
        season:      ep.season,
        episode:     ep.episode,
        title:       ep.title || `Episode ${ep.episode}`,
        needs_remux: !!ep.needs_remux,
        duration:    ep.duration || 0,
        watch_progress: ep.watch_progress || 0,
        watched:     !!ep.watched,
      });
    }
  }

  playerShowId      = showId;
  playerEpisodeList = list;
  playerEpisodeIdx  = list.findIndex(e => e.id === currentEpId);
  console.log(`[Autoplay] Playlist built: ${list.length} episodes, current index=${playerEpisodeIdx}`);
}

/**
 * Show the "Up Next" panel and start the 10-second countdown.
 */
function showUpNext() {
  const nextIdx = playerEpisodeIdx + 1;
  if (nextIdx >= playerEpisodeList.length) return;

  const next = playerEpisodeList[nextIdx];
  const overlay = document.getElementById('upnext-overlay');
  const titleEl = document.getElementById('upnext-title');
  const barEl   = document.getElementById('upnext-bar');
  if (!overlay || !titleEl || !barEl) return;

  const label = `S${String(next.season).padStart(2,'0')}E${String(next.episode).padStart(2,'0')} — ${next.title}`;
  titleEl.textContent = label;
  barEl.style.transition = 'none';
  barEl.style.width = '100%';
  overlay.style.display = 'block';

  // Force reflow so transition fires from 100%
  barEl.getBoundingClientRect();
  barEl.style.transition = 'width 10s linear';
  barEl.style.width = '0%';

  let remaining = 10;
  _upNextTimer = setInterval(() => {
    remaining -= 1;
    if (remaining <= 0) {
      clearInterval(_upNextTimer);
      _upNextTimer = null;
      upNextPlay();
    }
  }, 1000);
}

/**
 * Play the next episode immediately.
 */
function upNextPlay() {
  if (_upNextTimer) { clearInterval(_upNextTimer); _upNextTimer = null; }
  const overlay = document.getElementById('upnext-overlay');
  if (overlay) overlay.style.display = 'none';

  const nextIdx = playerEpisodeIdx + 1;
  if (nextIdx >= playerEpisodeList.length) return;

  const next = playerEpisodeList[nextIdx];
  const label = `S${String(next.season).padStart(2,'0')}E${String(next.episode).padStart(2,'0')} — ${next.title}`;
  const seekTo = next.watch_progress > 60 && !next.watched ? next.watch_progress : 0;

  // Advance index before calling playMedia so it doesn't get reset
  playerEpisodeIdx = nextIdx;

  playMedia('episode', next.id, label, next.needs_remux, next.duration, seekTo,
            0, 0, -1, false, playerShowId);
}

/**
 * Dismiss the Up Next panel without playing.
 */
function upNextCancel() {
  if (_upNextTimer) { clearInterval(_upNextTimer); _upNextTimer = null; }
  const overlay = document.getElementById('upnext-overlay');
  if (overlay) overlay.style.display = 'none';
}

// ─── Continue Watching carousel ──────────────────────────────────────────────
let _cwOffset = 0;   // current scroll offset in px

function cwScroll(dir) {
  const row     = document.getElementById('cw-row');
  const wrap    = row?.parentElement;
  if (!row || !wrap) return;

  const CARD_W  = 200 + 16;          // card width + gap
  const visible = wrap.clientWidth;
  const total   = row.scrollWidth;
  const maxOff  = Math.max(0, total - visible);

  _cwOffset = Math.max(0, Math.min(maxOff, _cwOffset + dir * CARD_W * 2));
  row.style.transform = `translateX(-${_cwOffset}px)`;
  row.style.transition = 'transform 0.35s cubic-bezier(0.4,0,0.2,1)';

  // Loop: if we've hit either end, jump to the other side after the animation
  if (_cwOffset >= maxOff && dir > 0) {
    setTimeout(() => {
      row.style.transition = 'none';
      _cwOffset = 0;
      row.style.transform = 'translateX(0)';
    }, 370);
  } else if (_cwOffset === 0 && dir < 0) {
    // already at start, loop to end
    setTimeout(() => {
      row.style.transition = 'none';
      _cwOffset = maxOff;
      row.style.transform = `translateX(-${maxOff}px)`;
    }, 370);
  }

  cwUpdateArrows();
}

function cwUpdateArrows() {
  const row  = document.getElementById('cw-row');
  const wrap = row?.parentElement;
  const prev = document.getElementById('cw-prev');
  const next = document.getElementById('cw-next');
  if (!row || !wrap || !prev || !next) return;
  const overflows = row.scrollWidth > wrap.clientWidth + 4;
  prev.classList.toggle('hidden', !overflows);
  next.classList.toggle('hidden', !overflows);
}

async function cwRemove(mediaType, itemId, btn) {
  const card = btn.closest('.cw-card');
  if (!card) return;

  // Optimistic remove with a quick fade
  card.style.transition = 'opacity 0.25s, transform 0.25s';
  card.style.opacity    = '0';
  card.style.transform  = 'scale(0.9)';

  await api(`/api/continue-watching/${mediaType}/${itemId}`, { method: 'DELETE' });

  setTimeout(() => {
    const row = card.parentElement;
    card.remove();
    _cwOffset = 0;    // reset scroll so arrows recalculate cleanly
    if (row) {
      row.style.transition = 'none';
      row.style.transform  = 'translateX(0)';
    }
    // Hide the whole section if nothing left
    const carousel = document.getElementById('cw-carousel');
    if (carousel && !document.querySelector('.cw-card')) {
      carousel.closest('.section-gap')?.remove();
    }
    cwUpdateArrows();
  }, 260);
}

// Run once after home page renders to decide whether arrows are needed
function cwInit() {
  _cwOffset = 0;
  cwUpdateArrows();
}

function showToastMsg(msg, error=false) {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;top:24px;right:24px;z-index:999;background:${error?'var(--red)':'var(--surface2)'};color:${error?'#fff':'var(--text)'};border:1px solid ${error?'rgba(239,68,68,0.4)':'var(--border)'};border-radius:var(--radius-sm);padding:12px 20px;font-size:14px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,0.4);animation:slideUp 0.3s ease`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ─── Theme System ─────────────────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function lighten(hex, amount) {
  const {r,g,b} = hexToRgb(hex);
  const clamp = v => Math.min(255, Math.round(v + amount));
  return `#${clamp(r).toString(16).padStart(2,'0')}${clamp(g).toString(16).padStart(2,'0')}${clamp(b).toString(16).padStart(2,'0')}`;
}

function darken(hex, amount) { return lighten(hex, -amount); }

function applyTheme(theme) {
  const root = document.documentElement;
  const accent = theme.accent || '#3B82F6';
  const bg = theme.bg || '#06080F';
  const surface = theme.surface || '#0B0F1A';
  const text = theme.text || '#E2E8F8';

  const {r,g,b} = hexToRgb(accent);
  const accent2 = lighten(accent, 30);

  root.style.setProperty('--accent', accent);
  root.style.setProperty('--accent2', accent2);
  root.style.setProperty('--accent-dim', `rgba(${r},${g},${b},0.15)`);
  root.style.setProperty('--accent-glow', `rgba(${r},${g},${b},0.4)`);
  root.style.setProperty('--bg', bg);
  root.style.setProperty('--surface', surface);
  // Derive surface2 and surface3 by lightening surface slightly
  root.style.setProperty('--surface2', lighten(surface, 10));
  root.style.setProperty('--surface3', lighten(surface, 20));
  root.style.setProperty('--text', text);
  // Derive text2 and text3 as dimmer versions
  const {r:tr,g:tg,b:tb} = hexToRgb(text);
  root.style.setProperty('--text2', `rgba(${tr},${tg},${tb},0.6)`);
  root.style.setProperty('--text3', `rgba(${tr},${tg},${tb},0.3)`);
}

function liveThemePreview() {
  const accent = document.getElementById('c-accent')?.value;
  const bg = document.getElementById('c-bg')?.value;
  const surface = document.getElementById('c-surface')?.value;
  const text = document.getElementById('c-text')?.value;
  if (accent) {
    document.getElementById('h-accent').value = accent;
    document.getElementById('h-bg').value = bg;
    document.getElementById('h-surface').value = surface;
    document.getElementById('h-text').value = text;
    applyTheme({accent, bg, surface, text});
  }
}

function hexInputChange(colorId, hexId) {
  const hex = document.getElementById(hexId).value;
  if (/^#[0-9A-Fa-f]{6}$/.test(hex)) {
    document.getElementById(colorId).value = hex;
    liveThemePreview();
  }
}

function applyPreset(preset, el) {
  document.getElementById('c-accent').value = preset.accent;
  document.getElementById('c-bg').value = preset.bg;
  document.getElementById('c-surface').value = preset.surface;
  document.getElementById('c-text').value = preset.text;
  document.getElementById('h-accent').value = preset.accent;
  document.getElementById('h-bg').value = preset.bg;
  document.getElementById('h-surface').value = preset.surface;
  document.getElementById('h-text').value = preset.text;
  applyTheme(preset);
  document.querySelectorAll('.theme-preset').forEach(e => e.classList.remove('active'));
  if (el) el.classList.add('active');
}

async function saveTheme() {
  const theme = {
    accent: document.getElementById('c-accent').value,
    bg: document.getElementById('c-bg').value,
    surface: document.getElementById('c-surface').value,
    text: document.getElementById('c-text').value,
  };
  const r = await api('/api/settings', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({theme})
  });
  if (r?.ok) showToastMsg('🎨 Theme saved!');
}

async function resetTheme() {
  const defaultTheme = { accent: '#3B82F6', bg: '#06080F', surface: '#0B0F1A', text: '#E2E8F8' };
  applyTheme(defaultTheme);
  await api('/api/settings', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({theme: defaultTheme})
  });
  renderSettings();
  showToastMsg('↺ Theme reset to default');
}

async function loadSavedTheme() {
  const settings = await api('/api/settings');
  if (settings?.theme) applyTheme(settings.theme);
}

// ─── Edit / TMDB Match ────────────────────────────────────────────────
let _editType = null;
let _editId = null;

function openEditPanel(type, id, currentTitle) {
  _editType = type;
  _editId = id;

  // Remove any existing panel
  document.getElementById('edit-panel')?.remove();

  const panel = document.createElement('div');
  panel.className = 'edit-panel';
  panel.id = 'edit-panel';
  panel.innerHTML = `
    <h4>🔍 Find Correct TMDB Match</h4>
    <div class="edit-search-row">
      <input class="form-input" id="edit-search-q" value="${escHtml(currentTitle)}" placeholder="Search TMDB..." onkeydown="if(event.key==='Enter')runTmdbSearch()">
      <select class="form-select" id="edit-search-type">
        <option value="movie" ${type==='movie'?'selected':''}>Movie</option>
        <option value="tv" ${type==='show'?'selected':''}>TV Show</option>
      </select>
      <button class="btn btn-primary btn-sm" onclick="runTmdbSearch()">Search</button>
    </div>
    <div class="tmdb-results" id="tmdb-results">
      <div style="color:var(--text3);font-size:13px;text-align:center;padding:20px">Search for the correct title above</div>
    </div>`;

  // Insert panel into modal body, before modal-body's first child
  const modalBody = document.querySelector('.modal-body');
  if (modalBody) {
    modalBody.insertBefore(panel, modalBody.firstChild);
    panel.scrollIntoView({behavior:'smooth', block:'nearest'});
  }
}

async function runTmdbSearch() {
  const q = document.getElementById('edit-search-q').value.trim();
  const type = document.getElementById('edit-search-type').value;
  if (!q) return;

  const el = document.getElementById('tmdb-results');
  el.innerHTML = '<div style="color:var(--text3);text-align:center;padding:20px">Searching...</div>';

  const results = await api(`/api/tmdb/search?q=${encodeURIComponent(q)}&type=${type}`);
  if (!results || results.length === 0) {
    el.innerHTML = '<div style="color:var(--text3);text-align:center;padding:20px">No results found. Try a different search.</div>';
    return;
  }

  el.innerHTML = results.map(r => `
    <div class="tmdb-result" onclick="applyTmdbMatch(${r.id})">
      ${r.poster_path
        ? `<img class="tmdb-result-poster" src="${r.poster_path}" alt="" onerror="this.outerHTML='<div class=tmdb-result-placeholder>🎬</div>'">`
        : `<div class="tmdb-result-placeholder">${type==='tv'?'📺':'🎬'}</div>`}
      <div style="flex:1">
        <div class="tmdb-result-title">${escHtml(r.title||'')}</div>
        <div class="tmdb-result-meta">${[r.year, r.rating?'⭐ '+r.rating.toFixed(1):null].filter(Boolean).join(' · ')}</div>
        ${r.overview ? `<div class="tmdb-result-overview">${escHtml(r.overview)}</div>` : ''}
      </div>
    </div>`).join('');
}

async function applyTmdbMatch(tmdbId) {
  const el = document.getElementById('tmdb-results');
  el.innerHTML = '<div style="color:var(--text3);text-align:center;padding:20px">⏳ Applying match and refreshing metadata...</div>';

  const endpoint = _editType === 'movie'
    ? `/api/movies/${_editId}/match/${tmdbId}`
    : `/api/shows/${_editId}/match/${tmdbId}`;

  const result = await api(endpoint, {method:'PUT'});
  if (result) {
    showToastMsg('✓ Match applied! Metadata updated.');
    // Re-open the modal with fresh data
    closeMediaModal();
    setTimeout(() => openMedia(_editType, _editId), 200);
  } else {
    showToastMsg('✗ Could not apply match', true);
    el.innerHTML = '<div style="color:var(--red);text-align:center;padding:16px">Failed to apply match. Check your TMDB API key in Settings.</div>';
  }
}

// ─── Init ─────────────────────────────────────────────────────────────
loadSavedTheme();
initDemoBanner();
navigate('home');

// Extra Added to Make PlayerControls Invisible via Idle Time

const playerContainer = document.querySelector('.player-modal-backdrop');
let idleTimer;

const resetIdleTimer = () => {
  // Remove idle class (shows cursor and controls)
  playerContainer.classList.remove('idle');
  
  // Clear existing timer
  clearTimeout(idleTimer);
  
  // Set new timer for 3 seconds
  idleTimer = setTimeout(() => {
    playerContainer.classList.add('idle');
  }, 3000);
};

// Listen for mouse movement
playerContainer.addEventListener('mousemove', resetIdleTimer);

// Optional: Also reset when entering the area
playerContainer.addEventListener('mouseenter', resetIdleTimer);
</script>
